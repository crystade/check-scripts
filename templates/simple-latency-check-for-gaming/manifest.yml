name: Simple Latency Check for Gaming Servers
description: |
  A RTT around 60ms is considered acceptable for most online gaming servers
variants:
  - name: Alert to all channels if exceeds 60ms RTT
    scriptFile: scripts/alerting-all.rice
  - name: Report minor incident if exceeds 60ms RTT
    scriptFile: scripts/minor-incident.rice
  - name: Report major incident if exceeds 60ms RTT
    scriptFile: scripts/major-incident.rice
  - name: Report critical incident if exceeds 60ms RTT
    scriptFile: scripts/critical-incident.rice
